{% extends "rental/base.html" %}
{% block title %}Payment Canceled{% endblock %}

{% block content %}
  <div class="text-center my-5">
    <h1 class="display-4 text-warning">Payment Canceled</h1>
    <p class="lead">
      You did not complete the payment.  Click below to try again.
    </p>
    <a href="{% url 'stripe_checkout' payment.booking.id %}" class="btn btn-primary">
      Retry Payment
    </a>
  </div>
{% endblock %}
