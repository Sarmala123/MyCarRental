<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rental Search</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <header>
        <h1>Search for Rentals</h1>
    </header>
    <main>
        <form method="GET" action="{% url 'rental_search' %}">
            <label for="start_date">Start Date:</label>
            <input type="date" id="start_date" name="start_date" required>
            
            <label for="end_date">End Date:</label>
            <input type="date" id="end_date" name="end_date" required>
            
            <button type="submit">Search</button>
        </form>

        {% if cars %}
            <h2>Available Cars</h2>
            <ul>
                {% for car in cars %}
                    <li>
                        <a href="{% url 'car_detail' car.pk %}">{{ car.name }}</a> - {{ car.price_per_day }} per day
                    </li>
                {% endfor %}
            </ul>
        {% else %}
            <p>No cars available for the selected dates.</p>
        {% endif %}
    </main>
    <footer>
        <p>&copy; {{ current_year }} Car Rental</p>
    </footer>
</body>
</html>
